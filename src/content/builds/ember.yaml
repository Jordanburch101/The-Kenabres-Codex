        - —
        - "Secret: Cleric spell ([[Divine Power]] / [[Mass Heal]]) · Ability ↑"
  note: |-
    Levels 1–3 are preset (joins at 3 with Point Blank / [[Precise Shot]]). Custom feats begin at level 5. All ability increases → CHA. **[[Heighten Spell]]** is the key metamagic — it lets you re-slot low-level control spells ([[Hideous Laughter]], [[Glitter Dust]], Winter's Grasp) at higher levels for more casts and higher DC.

    Feat order is flexible around the DC/penetration lines — take **[[Spell Penetration]]** early (you fight spell-resistant demons before your caster level is high), **[[Spell Focus]] (Enchantment)** once you have [[Hideous Laughter]]. **[[Spell Specialization]] ([[Hellfire Ray]])** only matters until you hit max caster level (~19–20); after that, respec it into more DC.
mythic:
  table:
    headers:
      - Rank
      - Pick
      - Why
    rows:
      - lv: 1
        cells:
          - "[[Abundant Casting]]"
          - "No [[Hideous Laughter]] yet (not a [[Loremaster]] until char 8), so bank spell slots — you already have Winter's Grasp / [[Glitter Dust]] to spam."
      - lv: 2
        cells:
          - "[[Best Jokes]] *(via Extra Mythic Ability)*"
          - "You'll have [[Hideous Laughter]] by now — [[Best Jokes]] makes it hit the **entire** enemy pack. The core of the build."
      - lv: 3
        cells:
          - "[[Improved Abundant Casting]]"
          - Even more spell slots.
      - lv: 4
        cells:
          - "Mythic [[Spell Penetration]] *or* [[Sorcerous Reflection]]"
          - "Spell Pen = never fail vs demon SR. [[Sorcerous Reflection]] helps cast heightened [[Hideous Laughter]] faster. Your call."
      - lv: 5
        cells:
          - "[[Greater Abundant Casting]] *(or [[Ascendant Element]]: Fire)*"
          - "More slots preferred; you'll take [[Ascendant Element]] at rank 7."
      - lv: 6
        cells:
          - "Mythic [[Spell Focus]] (Enchantment)"
          - "Higher enchantment DC (or [[Sorcerous Reflection]] instead)."
      - lv: 7
        cells:
          - "[[Ascendant Element]]: Fire"
          - "No enemy resists your [[Hellfire Ray]] anymore — big by this level."
      - lv: 8
        cells:
          - "[[Sorcerous Reflection]] *or* Mythic Critical (Ray)"
          - "Mythic Critical = huge [[Hellfire Ray]] damage (pairs with the Trickster crit feat)."
      - lv: 9
        cells:
          - "[[Last Stand]]"
          - "Ember never dies — even to Demon Lords. (Or a metamagic: Bolster / Intensified.)"
      - lv: 10
        cells:
          - Free choice
          - Only the final boss remains — take whatever's left.
picks:
  - heading: Hexes & Spells
    items:
      - tag: HEX
        name: "[[Slumber]]"
        note: "early MVP — sleep an enemy, bypasses SR, works on demons; ends on damage."
      - tag: HEX
        name: "[[Protective Luck]]"
        note: "enemies roll twice, take worse — essential on Unfair."
      - tag: HEX
        name: "[[Evil Eye]]"
        note: "debuff that sticks 1 round even on a save."
      - tag: HEX
        name: "[[Fortune]]"
        note: "once per rest — save for your carry vs a boss."
      - tag: HEX
        name: "Beast's Gift"
        note: "the fifth and final witch hex (see Level table, level 11)."
      - tag: CONTROL
        name: "Winter's Grasp, [[Glitter Dust]], [[Stinking Cloud]]"
        note: "all bypass spell resistance — your early-game answer before enchantment DC is online — then **[[Hideous Laughter]]** ★, [[Mind Fog]], [[Feeblemind]]."
      - tag: DAMAGE
        name: "[[Hellfire Ray]]"
        note: "★ — scales with caster level (1 ray → up to 3+). Boosted by Bolster & Intensified metamagic, [[Ascendant Element]], and crit feats."
      - tag: BUFF
        name: Buffs
        note: "[[Enlarge Person]], [[Heroism]] / [[Greater Heroism]], [[Death Ward]], (Greater) [[False Life]], [[Legendary Proportions]], [[Ice Body]], [[Mind Blank]] / Communal, [[Divine Power]], [[Foresight]]."
      - tag: UTILITY
        name: Utility
        note: "On-demand healing (Cure X Wounds, [[Heal]], [[Mass Heal]]), [[Remove Curse]] / Disease, [[Resurrection]], [[Dimension Door]], [[Greater Dispel Magic]] (strip boss pre-buffs)."
      - name: Metamagic that matters
        note: "**Heighten** (re-slot control spells higher), **Bolster** & **Intensified** ([[Hellfire Ray]] damage — Intensified lifts the 15-dice cap to 20, needs caster level 20). Get Power/Maximize from gear rather than feats."
gear:
  - k: Amulet
    v: "Early: **Amulet of the Blackwater Mirror** (hex DC). Ch.3: **Glass Amulet of Clarity** (mind-affecting DC — includes [[Hideous Laughter]]). Ultimate: **Heartstone of the Night Hag Queen** (+3 DC to all spells; ch.5) — or leave that for the MC and keep the Glass Amulet."
    flag: "Transcribed 'amulet of black and mirror' — verify; increases hex DC."
  - k: Armor
    v: "Any **Haramaki** (no arcane spell failure). Ultimate: **Deadly Grace** (bonus to ranged touch attacks → [[Hellfire Ray]])."
    flag: "Transcribed 'deadly race' — verify; bonus with ranged touch attacks, which is what Hellfire Ray uses."
  - k: Robe
    v: "Early: **Robe of Inevitability** (buy from Woljif's merchant; +2 spell pen). Ultimate: **Robe of the Seven Sins** (highest DC + caster level + spell pen). Alt: **Call of the Fiery Things** (ch.5; big fire damage) if not on another party member."
    flag: "Robe of Inevitability vendor transcribed 'wji' — likely a specific vendor; verify (+2 spell penetration). 'Call of the Fiery Things' (ch.5 fire-damage robe) name also unverified."
  - k: Belt
    v: "DEX belts (initiative + ranged touch), later DEX+CON or all-stats. **Belt of the Last of the First Humans** hugely boosts [[Hellfire Ray]] (usually reserved for the MC)."
    flag: "Verify exact name — greatly boosts Hellfire Ray damage; often preferred on the main character."
  - k: Gloves
    v: "**Twisted Temptation** — top enchantment-DC gloves; its secondary effect is Will-based, matching your best control spells."
  - k: Head
    v: "**Headband of Charisma** (highest); ultimately **Darkness Caress** or **Mental Perfection** headbands."
    flag: "Verify 'Darkness Caress' / 'Mental Perfection' headband names."
  - k: Cloak
    v: "Early: **Cloak of Resistance** (highest modifier). Ultimate: **Grand Festival Cloak** (+2 circumstance CHA; ch.5) — the extra +1 DC is minor, so fine to leave for the MC."
  - k: Rings
    v: "**Ring of Pyromania** ([[Hellfire Ray]] damage + spell pen), **Chaotic Fascination** (enchantment DC), **Red Salamander** (free fire spells incl. [[Hellfire Ray]] & Fiery Body)."
    flag: "Verify 'Ring of Pyromania', 'Chaotic Fascination', 'Red Salamander' names/sources."
  - k: Bracers
    v: "**Mind Break** — higher enchantment DC."
    flag: "Transcribed bracers 'mind break' — verify; higher enchantment DC."
  - k: Staff
    v: "Early: **Quarterstaff of Coercion** (Will-save DC → [[Glitter Dust]], [[Hideous Laughter]]). Ch.3+: **War Mage** staff (DC to all spells + spell pen) and the **Plague of Madness** Crusade Relic (free empowered+maximized spell once per battle — cast a cantrip 3× pre-battle to proc it)."
    flag: "Verify 'War Mage' staff and 'Plague of Madness' relic. A newer 'Sage/Major' staff exists but gives less DC and is INT-based, so worse for CHA-caster Ember."
  - k: Quick Slots
    v: "**Greater Persistent** + **Greater Quicken** metamagic rods (swift-cast heightened spells; plentiful, incl. the Midnight Isles DLC). **Devouring Lust** ([[Hellfire Ray]] damage, ch.3). **Grandmaster's Rod** (free empower+maximize — combos with Plague of Madness for a second nuke same battle). **Rasmir's Mask** (ch.5). **Pearls of Power** (Arcane Merchant at Drezen, ch.3) & the **Old Grimoire** for 80+ [[Hideous Laughter]] casts per rest."
    flag: "Rasmir's Mask transcribed 'Ras meir's mask' — verify; ch.5, cast one spell as a free action per round. Old Grimoire transcribed 'old grimo' — verify; grants many low-level spell casts, pushing Hideous Laughter casts past 80/rest."
combat:
  bullets:
    - "**Early game — [[Slumber]].** Sleep an enemy (even pre-battle ambush); it bypasses SR and works on demons. It breaks on damage, so leave the sleeper for last or have melee coup-de-grace it (free attacks nearby, too)."
    - "**Before ch.3, lean on SR-bypassing control** — Winter's Grasp, [[Glitter Dust]], [[Stinking Cloud]], [[Slumber]] — since your enchantment DC isn't high enough yet to reliably land [[Hideous Laughter]]."
    - "**[[Protective Luck]] on your tank** before battle (infinite casts). It's short (~12s) but you re-trigger and **extend it out of combat repeatedly** so it's up when the fight starts. Don't bother doing every party member — too tedious."
    - "**Ch.3 onward — spam [[Hideous Laughter]].** With DC gear + [[Best Jokes]] it hits the whole pack and stun-locks them. [[Hellfire Ray]] anything immune."
footnotes:
  - "Class split ([[Witch]] 9 / [[Loremaster]] 10 / [[Sorcerer]] 1) & Crossblooded bloodlines (Gold + Fey)."
  - "No fixed point-buy (respec companion); all increases → CHA."
  - "[[Persistent Spell]] feat is Unfair-only / optional (rods replace it)."
  - "Gear names: Blackwater Mirror amulet, Deadly Grace armor, Robe of Inevitability vendor, Call of the Fiery Things, Belt of the Last of the First Humans, Darkness Caress / Mental Perfection headbands, Pyromania / Chaotic Fascination / Red Salamander rings, Mind Break bracers, War Mage / Plague of Madness / Sage staves, Rasmir's Mask, Old Grimoire."
