summary: "Mass-control the battlefield into submission — mostly by making whole enemy packs **laugh themselves to death** ([[Hideous Laughter]] + **[[Best Jokes]]**) at a spell DC north of 55. When something resists the enchantments, you delete it instead with **[[Hellfire Ray]]**, one of the deadliest single-target spells in the game. Plus solid party buffs on the side. Built via a [[Witch]] → **[[Loremaster]]** core with a one-level **Crossblooded [[Sorcerer]]** splash for fire + enchantment DC."
abilityScores:
  cha:
    value: MAX
    tag: "= DC & slots"
    emphasis: hi
  dex:
    value: secondary
    tag: initiative / to-hit
  con:
    value: enough
  str:
    value: DUMP
    emphasis: dump
  int:
    value: low
    tag: skill ranks only
  note: "**Charisma is everything** — it drives spell DC and spell slots, the entire build. Stack it as high as possible via levels and gear. **Dexterity** is secondary — higher initiative and ranged-touch attack rolls for **[[Hellfire Ray]]**. Keep enough **Constitution** to survive a stray hit; dump **Strength**; keep **Intelligence** only for the skill ranks you want."
skills:
  main: "Main picks: **[[Persuasion]]** — natural fit for a Charisma character; **[[Use Magic Device]]** — cast scrolls from other classes (e.g. Cleric) for extra support."
  note: "**Knowledge (World)** *or (Arcana)* — pick one. **World** lets her cook at camp (food buffs are strong; boosted later by [[Skill Focus]]); **Arcana** is fine too. Whichever you choose becomes your [[Loremaster]] Skill-Focus prereq."
identity:
  - k: Concept
    v: "Ember joins at level 3 (you control her from level 4). Levels 1–3 are preset — she starts with **[[Point Blank Shot]]** & **[[Precise Shot]]**, which end up fine for ray spells even though she should never make plain ranged attacks (her hexes are infinite-cast)."
  - k: Classes
    v: "**[[Witch]] 9** (hexes + spontaneous arcane) · **[[Loremaster]] 10** (secrets to poach [[Hideous Laughter]] and other class spells + caster level) · **Crossblooded [[Sorcerer]] 1** (fire + enchantment DC)."
  - k: Win condition
    v: "**[[Hideous Laughter]]** (poached via [[Loremaster]]) + the **[[Best Jokes]]** mythic ability = AoE stun-lock on whole packs. **[[Hellfire Ray]]** handles anything that resists."
  - k: Why Loremaster
    v: "Its \"secrets\" let a witch grab spells she can't normally learn (Wizard's [[Hideous Laughter]], Cleric buffs/heals) and push caster level. Needs **1 metamagic + 1 [[Skill Focus]] (Knowledge)** feat to qualify."
  - k: Why Crossblooded
    v: "One level, three payoffs: a normal feat, the **Gold** dragon bloodline (boosts fire → [[Hellfire Ray]]), and the **Fey** bloodline (**+2 DC to compulsion spells** — [[Hideous Laughter]] qualifies). Delays casting by one level, which doesn't matter by then."
