  note: |-
    **Custom from level 1** — she starts with **[[Skill Focus]]** ([[Trickery]]) and **[[Weapon Finesse]]**. Ability increases go into **WIS** (DEX at 20). Spellcasting feats come *before* melee feats — her [[Stinking Cloud]] is that good boosted. Her Spirit grants rapiers the Keen property at level 5, so delaying [[Improved Critical]] to level 13 costs nothing (Keen and Improved Critical don't stack).

    If you don't care about her melee/dual-wield side, swap the late melee feats for **[[Improved Initiative]]** and more spellcasting. Dual-wield can start as early as ~17 if you delay metamagic, but her poison doesn't need it early.
mythic:
  table:
    headers:
      - Rank
      - Pick
      - Why
    rows:
      - lv: 1
        cells:
          - "[[Corruptor]]"
          - "Your poisons/diseases **ignore immunities** — [[Stinking Cloud]] now hits every enemy in the game (demons, even Demon Lords) and still spares your own immune party. The whole build."
      - lv: 2
        cells:
          - "[[Abundant Casting]] *(via Extra Mythic Ability)*"
          - "More slots for a cheap low-level spell + her [[Shaman]] buffs."
      - lv: 3
        cells:
          - "[[Improved Abundant Casting]]"
          - "Even more slots (heighten any 3rd+ slot into another [[Stinking Cloud]])."
      - lv: 4
        cells:
          - "Mythic [[Spell Focus]] (Conjuration)"
          - "Conjuration has little DC gear, so every point matters. (Delay Mythic Critical.)"
      - lv: 5
        cells:
          - "Second Spirit: Nature"
          - "A full-scaling pet (Dog — the \"good boy\" — or Wolf) far earlier than the level-16 default. Alt: [[Master Shapeshifter]] / [[Greater Abundant Casting]]."
      - lv: 6
        cells:
          - "[[Mythic Critical]] (Rapier)"
          - "Now that her melee feats are online."
      - lv: 7
        cells:
          - "[[Greater Abundant Casting]]"
          - "Up to 9th-level spells by now."
      - lv: 8
        cells:
          - "[[Mythic Two-Weapon Fighting]]"
          - "Higher attack rolls dual-wielding (or Mythic [[Weapon Specialization]] / Favored Metamagic: Persistent for +1 [[Stinking Cloud]] DC)."
      - lv: 9
        cells:
          - "[[Last Stand]]"
          - "Survivability, especially for the *Inevitable Excess* DLC. Alt: [[Master Shapeshifter]] / Mythic Beast."
      - lv: 10
        cells:
          - "Free choice"
          - "Mythic TWF / Weapon Spec / Persistent — or Mythic [[Improved Initiative]] if you took the normal one."
picks:
  - heading: "Hexes & Spells"
    items:
      - name: "Hexes (infinite)"
        note: "**[[Protective Luck]]** (enemies roll twice, take worse — on your tank; she can't self-cast it), **[[Evil Eye]]** (−4 to enemy saves/AC; *stacks with Ember's [[Evil Eye]] for −8* since it's a different class), **[[Fortune]]** (once/rest, save for a boss), **[[Cackle]]** (extend [[Fortune]]/[[Protective Luck]]), Battle Master (free melee feats)."
      - tag: CONTROL
        name: "[[Stinking Cloud]] ★"
        note: "Conjuration → bypasses spell resistance; poison → [[Corruptor]] makes it ignore immunities. Early: [[Winter's Grasp]] (has friendly fire, but works)."
      - tag: META
        name: "[[Heighten Spell]] · [[Persistent Spell]]"
        note: "[[Heighten Spell]] re-slots [[Stinking Cloud]] higher for more casts + DC; [[Persistent Spell]] makes the enemy save twice."
      - tag: SUPPORT
        name: "A full [[Shaman]] buff/heal book"
        note: "And crucially **[[Delay Poison]]** (Communal) cast on the whole party (e.g. by a cleric like Sosiel) so your own [[Stinking Cloud]] never nauseates your team — or Camellia herself."
