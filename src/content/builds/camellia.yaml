summary: "One spell renders a whole pack useless: **[[Stinking Cloud]]** nauseates enemies into helplessness while Camellia strolls in for the kill with her rapiers — and thanks to the **[[Corruptor]]** mythic ability, her poison ignores immunities, so it lands on *everything*, demons and Demon Lords included. On top of that she's a [[Shaman]] (party buffs + debuff hexes) and your best trap/lock specialist. Late game she dual-wields high-crit rapiers for real melee damage too."
abilityScores:
  wis:
    value: MAX
    tag: "spell DC & slots"
    emphasis: hi
  dex:
    value: secondary
    tag: "attack & AC (finesse)"
  note: "**Story companion** — respec and prioritize. **Wisdom** drives her poison/conjuration spell DC and spell slots for buffing, healing, and debuffing. **Dexterity** is her attack stat ([[Weapon Finesse]] rapiers) and AC — kept high from the start, topped off at level 20. She'll have slightly lower AC/attack than a pure-DEX melee build, but it doesn't matter — poisoned enemies can't fight back when she moves in."
skills:
  main: "**[[Trickery]]** — her specialty (plus a noble-background bonus). She's your best pick for chests and traps. **[[Mobility]]** (or **[[Stealth]]** / **[[Perception]]**) — depends on what the rest of the party already covers. She has the Dexterity for any of them."
  note: "**Knowledge (Arcana or World)** — one rank of **[[Skill Focus]]** here later, purely to qualify for **[[Loremaster]]**."
identity:
  - k: Concept
    v: "Camellia joins at level 1 (near-full customization) already carrying **[[Skill Focus]]** ([[Trickery]]) and **[[Weapon Finesse]]**. Built as a caster first — safer than tanking with her, which would delay the spell/hex progression that makes her shine."
  - k: Classes
    v: "**[[Shaman]] 16** (Nature spirit — hexes, buffs, and a pet) · **[[Loremaster]] 3** (spellcasting + broken secrets) · **[[Titan Fighter]] 1** (dual-wield + a bonus feat)."
  - k: Win condition
    v: "**[[Stinking Cloud]]** + the **[[Corruptor]]** mythic ability. [[Stinking Cloud]] is a poison, so normally demons are immune — Corruptor removes that, making it a universal AoE lockdown (and it won't touch your own poison-immune party)."
  - k: Why Loremaster
    v: "By level 17 she already has every [[Shaman]] buff/hex she wants, so [[Loremaster]] just continues spellcasting and hands over powerful secrets (see the level table)."
  - k: Why Titan Fighter
    v: "A one-level dip that lets her **dual-wield staves** (stacking spell-DC for [[Stinking Cloud]], BG3-style) plus a bonus feat. Alt: **[[Alchemist]] / [[Vivisectionist]]** (sneak attack + a Dexterity mutagen) if you prefer more melee flavor."
