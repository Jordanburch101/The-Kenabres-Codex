    flag: "Transcribed 'Ral goggles' — verify exact name; big Perception + Trickery, ch.4."
  - k: Cloak
    v: "**Cloak of Resistance** (highest modifier)."
  - k: Rings
    v: "**Colman's Ring** ([[Trickery]]) early; later **Ring of Evasion** and the **Bane of Spirit** Crusade Relic (converts her extra elemental damage to irresistible Force type — bypasses most DR)."
    flag: "Verify 'Colman's Ring' name — boosts Trickery, early. 'Bane of Spirit' relic ring converts extra elemental damage to irresistible Force type, bypassing most late-game DR — verify exact name."
  - k: "Weapon: Staves"
    v: "For casting: **Quarterstaff of the War Mage** (ch.3; +DC to [[Stinking Cloud]]). With the [[Titan Fighter]] dip, dual-wield it with the new **Sage staff** for +1 DC (better on INT casters, so marginal for her)."
    flag: "Transcribed 'sin mes / Sage staff' — verify; +1 spell DC, better on INT casters. Only a small gain for WIS-based Camellia."
  - k: "Weapon: Rapiers"
    v: "Best main hand: **Translucent Needle of Astonishment**. Off-hand: **Interceptor Rapier**. Early: the Holy Rapier from the Drezen merchant."
    flag: "Translucent Needle of Astonishment: from Camellia's last personal quest (if you kill a certain NPC) — evil-outsider bane, staggers/paralyzes on the first strike each round even on a save; verify exact name. Interceptor Rapier: bonus to attack-of-opportunity rolls/damage and an extra attack on a killing blow; verify name."
  - k: "Shield (on an ally)"
    v: "**Undying Love of the Hopebringer** heavy shield — its Dark Aura raises the DC of all poison spells (including [[Stinking Cloud]]). It's an aura, so any nearby melee ally can carry it."
  - k: Quick Slots
    v: "**Quicken** & **Extend** metamagic rods (even Lesser Quicken helps — [[Stinking Cloud]] is only 3rd level). The **Imp Pad** (profane [[Trickery]]). If you skip Second Spirit, the **Triceratops Statue** gives a free (non-scaling) pet a chapter earlier."
    flag: "Transcribed 'Imp pad' — verify; profane bonus to Trickery."
combat:
  bullets:
    - "**Immunize your party first.** Cast **[[Delay Poison]]** (Communal) on everyone (from a cleric like Sosiel) — otherwise your own [[Stinking Cloud]] nauseates your team and Camellia. This is what lets your tank stand inside the cloud."
    - "**Tank ahead, then drop the cloud.** Send your tank (Seelah) in to aggro; from range Camellia drops **[[Stinking Cloud]]** (heightened + persistent) on the pack. Enemies re-save every round, so more and more fail over time — half the pack is neutralized turn one."
    - "**Stack save debuffs.** Her **[[Evil Eye]]** (−4) + Ember's [[Evil Eye]] (−8 total) + Sosiel's [[Visions of Madness|Vision of Madness]] (up to −10) + your mythic path's aura. Her DC tops out around 43 (conjuration has little DC gear), but with save-stacking + re-saves that's plenty on Unfair."
    - "**Later:** Quicken rod → [[Evil Eye]] (swift), then an instant Quickened [[Stinking Cloud]], so the enemy already has the −4 when the cloud hits."
    - "**Ambush with hexes:** select [[Evil Eye]] (Armor Class), target an unaware enemy, and charge your whole melee party in as she casts — big first-round hit chance."
    - "**Melee when safe.** Only send her in with rapiers once the pack is controlled (her defenses aren't great). Buff the tank with [[Protective Luck]] before every fight — it's free."
footnotes:
  - "Class split ([[Shaman]] 16 / [[Loremaster]] 3 / [[Titan Fighter]] 1); the four non-Shaman levels land last (17–20) and [[Boon Companion]] keeps her pet fully scaled despite them. Ability increases: WIS at 4/8/12/16, then DEX at 20 to make it an even score."
  - "[[Loremaster]] Rogue-secret grabbing the Trickster mythic-path crit feat for even higher rapier crit range — works as of the final patch (arguably an oversight). Other strong secret options: Living Finish, [[Opportunist]], a familiar."
  - "\"Corruptor\" is the name given in the video; the exact Fextralife page name is unconfirmed — verify the exact mythic-ability name in-game."
  - "Gear names (transcribed from audio, verify exact spellings/locations): Fencer's Gift gloves, Spirit Trackers boots, Feral Goggles, Colman's Ring, Bane of Spirit relic ring, Sage staff, Translucent Needle of Astonishment, Interceptor Rapier, Imp Pad."
