    emphasis: dump
  note: |-
    Push **DEX to 20** (your attack + damage stat with a bow) and **WIS to 18**. Fully **dump Charisma**. Don't drop Intelligence below its starting value or you'll lose skill points. Put the remaining points into **CON 12** — or into **STR 12** instead, since composite bows add your STR modifier to damage (see Gear).

    Level-up increases: pour into **DEX** (or **STR** if you commit to composite-bow damage). *STR left at base unless you go the composite-bow damage route.*
skills:
  main: "Your biggest bonuses land in **[[Stealth]]**, **[[Perception]]**, and **Lore (Nature)**."
  note: "**Swap:** if you don't actually use [[Stealth]], don't waste the point — put it into **Lore (World)** (more useful, slightly more role-play flavor) or **Lore (Arcana)** instead."
identity:
  - k: Class
    v: "[[Ranger]] — **[[Demon Slayer]]** archetype. Loses the free favored-enemy choice; instead treats Demons of Slaughter, Magic & Strength as favored enemies, plus **Fiendish Quarry** alongside regular Quarry."
  - k: Race
    v: "**Tiefling** — *Faultspawn* or *Asura-spawn* heritage: +2 DEX, +2 WIS, −2 INT (unused), +2 saves vs enchantment, and a [[Hideous Laughter]] cast. **Human** is the strong all-rounder alt (bonus feat + free ability bump)."
  - k: Background
    v: "**Hunter** — grants short/long bow proficiency, which converts into a straight enhancement bonus for this ranged build."
  - k: Alignment
    v: "**Chaotic Good** (or at least Chaotic) — required to play smoothly into the [[Azata]] mythic path."
  - k: Mythic Path
    v: "**[[Azata]]** — grants **[[Aivu]]** (effectively a second companion) and leans into the demon-slaying fantasy. See the Mythic section."
