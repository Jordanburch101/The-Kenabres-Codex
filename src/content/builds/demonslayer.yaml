  note: |-
    Regular feats land on odd levels; Combat-Style (Archery) bonus feats on 2 / 6 / 10 / 14 / 18. Take the ranger to level 20 — the final demon-slaying bonus lands at 20.

    Levels 15 & 19 ([[Critical Focus]], [[Snapshot]]) and the level-18 style feat are flexible — swap freely without hurting the build. **[[Rapid Shot]]** pairs with its mythic version to erase the −2 attack penalty (see Mythic).
picks:
  - heading: Divine Spell Picks
    intro: Rangers cast a small list, up to 4th level, caster level capping at 17. Grab these as each spell tier opens (levels 4 / 7 / 10 / 13).
    items:
      - tag: 1ST
        name: "[[Hurricane Bow]]"
        note: "turns your longbow's 1d8 into 2d6; a flat pre-combat damage buff that scales with all your extra hits."
      - tag: 2ND
        name: "[[Sense Vitals]]"
        note: "adds sneak-attack dice that grow as you level. *(Alt: [[Barkskin]].)*"
      - tag: 3RD
        name: "[[Instant Enemy]]"
        note: "swift action to tag any target as your favored enemy. Lets you apply your huge demon bonuses to non-demons."
      - tag: 4TH
        name: "[[Animal Growth]] (big companion buff) or [[Aspect of the Wolf]]"
        note: "+4 enhancement STR/DEX — *won't stack with enhancement bonuses from gear like belts, so prefer [[Animal Growth]] if it conflicts*. Alt: [[Freedom of Movement]]."
gear:
  - k: Weapon
    v: "**Composite bows** — most bows in the game carry the composite tag, adding your STR modifier to damage. Take the best you find."
  - k: Big Game Hunter Gloves
    v: "**Act 2 — Lost Chapel**, from optional boss **Mogla**. Your Quarry target also takes −2 AC and becomes *sickened*. Note: no payoff until you get Quarry at level 11 (~mid Act 3)."
    flag: "Verify exact item name and location in-game. Video (audio) said 'big game gloves' from a boss named Mogla at the Lost Chapel in Act 2."
  - k: Chain Shirt
    v: "**Act 1 — Tower of Estrod.** ~6 base AC + up to a 6 DEX AC bonus, letting a ranger use full DEX with real armor early."
    flag: "Audio rendered the name as 'Lady Kalandra's chain shirt' — verify the exact item name in-game."
  - k: Wicked Longbow
    v: "**Act 1 — Market Square**, found inside one of the houses."
    flag: "Verify exact bow name and house location in Market Square."
mythic:
  intro: "Recommended path — grants **[[Aivu]]** (effectively a second companion; her caster level is 20 post-patch 1.2, down from 30, but still very strong) and fits the demon-slayer identity. Best played **Chaotic Good**."
  table:
    headers:
      - ""
      - ""
    rows:
      - lv: Mythic Abilities
        cells:
          - "**[[Cleaving Shot]]** (first pick — crits / kills deal weapon damage to everything in 10 ft). Then pick among **Distracting Shot**, **Exposed Vulnerability**, **The Bigger They Are**, and **Mythic Beast** (buffs your companions)."
      - lv: Mythic Feats
        cells:
          - "Take the mythic version of feats you already have — above all **Mythic [[Rapid Shot]]**, which removes the −2 penalty and makes [[Rapid Shot]] essentially a free extra attack."
      - lv: Superpowers (pick 4)
        cells:
          - "**Life-Bonding Friendship** (share teamwork feats with the whole party; brief death-prevention — don't rely on that part) and **[[Supersonic Speed]]** (permanent in-combat Haste; 20% miss chance vs melee/ranged attacks on you, 10% vs targeted spells, area damage halved — but the miss chance does *not* stack with concealment like Blur)."
  note: "**Any path works** with this build — [[Azata]] is simply the strongest fit. Just match your alignment to the path you choose."
combat:
  bullets:
    - "**Pre-buff.** Keep **[[Hurricane Bow]]** and **[[Sense Vitals]]** active, plus any [[Azata]] songs/buffs."
    - "**Apply Quarry** (from level 11) — especially on bosses; the auto-confirmed crit and +2 to hit are big."
    - "**Target demons.** In mixed fights, always shoot the demons first — that's where your bonuses live. Once you have **[[Instant Enemy]]** you can extend the bonus to anything."
    - "**Then point and click.** By level 9–10 you're hitting demons for ~100–150 per regular hit (more on crits), before [[Aivu]] and your animal companion add their own turns."
  closer: "The upshot: high damage, easy to pilot, strong early *and* late — a specialist that shines because the whole campaign is demons."
footnotes:
