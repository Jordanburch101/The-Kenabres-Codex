summary: A rebuild of the fighter-Wenduag into a **[[Slayer]]** who dual-wields **throwing axes**. The Slayer's feat count fuels full two-weapon-fighting *and* the ranged feat chain, while [[Sneak Attack]] and slayer talents pile damage, dispels and debuffs onto every throw. Dual-wielding thrown weapons stacks attacks to roughly **nine per round** — a machine gun that fires hand-axes. More efficient than the pure-fighter version and strong on every difficulty.
