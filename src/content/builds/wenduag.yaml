mythic:
  intro: Path-agnostic — take these regardless of which mythic path you choose.
  table:
    headers:
      - Rank
      - Pick
      - Why
    rows:
      - lv: 1
        cells:
          - "[[Cleaving Shot]]"
          - Kill an enemy and hit nearby ones too — the core efficiency pick for any ranged character.
      - lv: 2
        cells:
          - "[[Mythic Two-Weapon Fighting]]"
          - Off-hand and main-hand attacks all use your full attack bonus — huge for a dual-wielder. AB-first while you're running Deadly Aim + Rapid Shot penalties.
      - lv: 3
        cells:
          - "[[Distracting Shot]]"
          - Your hits hit the enemy with a hefty penalty to melee AC — helps your (melee) allies. Preferred over Ranging Shots (which needs you stationary and resets on hit).
      - lv: 4
        cells:
          - "[[Mythic Deadly Aim]]"
          - Adds damage to *every* attack, crit or not. As a high-BAB Slayer she gets the best return from it — better than [[Mythic Critical]] given the throwing-axe's poor 19–20 crit range.
      - lv: 5
        cells:
          - "[[The Bigger They Are]]"
          - Bonus vs. Large+ enemies — and it **stacks with Spawn Slayer**, so double value against the big demons.
      - lv: 6
        cells:
          - "[[Mythic Rapid Shot]]"
          - Erases Rapid Shot's −2 penalty. If your AB is already high enough, you can swap this slot for [[Mythic Critical]] earlier.
      - lv: 7
        cells:
          - "[[Always a Chance]]"
          - A natural 1 no longer auto-misses — with this many attacks per round you *will* roll 1s, so this saves real damage. (Skip if a Trickster main already grants a similar effect.)
      - lv: 8
        cells:
          - "[[Mythic Improved Initiative]]"
          - Act first — catch enemies flat-footed for a full round of sneak attacks. (Some DLC enemies are fear-immune, so this, not [[Shatter Defenses]], is your flat-footed source there.)
      - lv: 9
        cells:
          - "[[Lethal Stance]]"
          - Insurance for the rare times she's hit — you fight the ultimate demon lords by now (and stacked DLC packs). A play-it-safe pick.
      - lv: 10
        cells:
          - "[[Mythic Critical]]"
          - Take it here if you didn't grab it earlier — or any flex mythic feat.
  note: "**Also considered:** [[Exposed Vulnerability]] and [[Ranging Shots]] are underwhelming for this build (Exposed Vulnerability only procs on every third hit for weak damage — unlike [[Elemental Barrage]], which scales per rank), and [[Ever Ready]] only helps the single [[Opportunist]] attack of opportunity. Take them only if you run out of better picks."
combat:
  bullets:
    - "**Pre-buff.** Get size spells ([[Legendary Proportions]] / [[Enlarge Person]]) on her for Strength → damage, plus Haste and team buffs."
    - "**Win initiative.** Her stacked [[Improved Initiative]] (feat + mythic + Hare familiar) usually lets her act first — a full opening round of sneak attacks against flat-footed enemies."
    - "**Toggle Deadly Aim + Rapid Shot.** On once your attack bonus can eat the −2; **off** against very high-AC bosses on Unfair."
    - "**Machine-gun.** Dual-wielding throwing axes puts you near **nine attacks a round**; [[Opportunist]] adds an attack whenever an ally strikes an enemy in melee, and the Insistent Talisman adds throws off allied attacks of opportunity."
    - "**Strip and shred.** Every hit rolls [[Dispelling Attack]] — against a buffed demon your volume of throws peels its defenses off in a round or two."
    - "**Use [[Improved Quarry]]** (level 19) on bosses — it's a free action, works on any enemy type (demons, angels, and the non-demon Outsiders of the DLCs), and you can re-apply it constantly."
  closer: "The upshot: a high-volume sneak-attacker that also dispels, debuffs and catches enemies flat-footed — a \"machine gun that fires axes,\" effective on every difficulty."
footnotes:
  - "**Level-up increases** into DEX (video: level-4 and most later increases)."
  - "Sneak Attack timing: first die at level 3, +1d6 every 3 levels; Accomplished Sneak Attacker → 2d6 at level 5."
  - Weapon Focus (Throwing Axe) exact feat-slot level (video bundles it near level 1–3).
  - Improved Quarry as a level-19 Slayer feature (video's "improved query") — confirm exact name/level in-game.
  - Level-20 talent is free choice.
  - "Throwing-axe names: Throwing Axe of Silence (Ch.2, Woljif recruit / Lost Chapel), Fixated Obsession & Frost's Embrace (Ch.3, Winter Sun), Nordic Wilka's Drumming Axe (Ch.4, Storyteller)."
  - "Gear names: Insistent Talisman, Snakeskin / Web Strider, Belt of Physical Perfection, Death Dealer's / Big Game Hunter Gloves, DEX boots / Sure-Footing, Shy Lady Helmet, Merciless Shot ring — all transcribed from audio; verify exact names/locations."
