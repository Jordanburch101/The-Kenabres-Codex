    emphasis: dump
  note: "**DEX is the star** — it drives your throwing-axe attack rolls (and your extra two-weapon attacks). Pour the level-4 increase and almost every later increase into **DEX**. **Damage comes from STR**, not DEX — throwing axes add your Strength modifier to damage just like composite longbows. Wenduag can reach very high Strength from **size-boosting spells** ([[Enlarge Person]] / [[Legendary Proportions]]) plus belt/helmet gear, so you don't need a huge starting STR — but keep it healthy. **WIS is naturally low**; dump **CHA**."
skills:
  main: "Main picks: **[[Perception]]**, **Lore (Nature)**, and **[[Mobility]]** (free value from her high DEX). Leave **Lore (Nature)** to another party member if someone better-suited can carry it — Wenduag's low WIS makes her a poor primary for it."
  note: "**Third point:** since Wenduag can hit high Strength from size buffs, **[[Athletics]]** is a fine home for it. If no one in your party casts size buffs on her, take **[[Stealth]]** instead."
identity:
  - k: Class
    v: "[[Slayer]] — **[[Spawn Slayer]]** archetype. Grants attack bonuses against **Large, Huge and Gargantuan** enemies — and many of the game's most dangerous demons are exactly that size. This extra to-hit matters because thrown-weapon attackers tend to run lower attack bonus than melee (they can't flank)."
  - k: Why not Deliverer
    v: The **Deliverer** archetype's signature ability keys off your *zeal / alignment* — useless on Wenduag, who is **Chaotic Evil** like most of what you fight. **Spawn Slayer** is the pick.
  - k: Character
    v: "**Wenduag** is one of the most customizable companions in the game (alongside Seelah's flexibility, Camellia and Lann). She joins early and you set her class from level 1."
  - k: Alignment
    v: "**Chaotic Evil** (her default). Fine for a Slayer — no alignment-gated features here."
  - k: Mythic Path
    v: "**Any path works** — the mythic picks below are the ranged-DPS abilities/feats regardless of path. One niche exception: the *Sure-Footing* boots are only obtainable on a **Demon** mythic character (see Gear)."
