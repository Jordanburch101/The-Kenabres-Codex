  note: |-
    **Feat-timing logic:** [[Weapon Focus]] comes before [[Rapid Shot]]/[[Deadly Aim]] because early on your attack bonus is at its lowest and the flat +1 helps most (you're already swimming in attacks from dual-wielding, so the extra-attack feats can wait). [[Deadly Aim]] and [[Rapid Shot]] land once your bonus is high enough to eat the −2. On **Unfair**, toggle them off against high-AC bosses. [[Manyshot]] is **skipped** — it only works with bows, not throwing axes.

    **Multiclass alternative (from level 17):** you already have almost everything Slayer offers, but staying pure earns two more talents, more [[Sneak Attack]], and the standout [[Improved Quarry]] at 19. If you'd rather splash: **1× [[Demon Slayer]]** (Ranger) for +attack/damage vs. demons, then **1–3× [[Vivisectionist]]** ([[Alchemist]]) for extra sneak dice and a DEX mutagen.
picks:
  - heading: What Every Throw Does
    intro: Slayer is a **non-caster**. Your "spell list" is the pile of effects that fire on each of your many hits, plus the buffs you want your party's casters to keep on you.
    items:
      - tag: HIT
        name: "[[Dispelling Attack]]"
        note: each throwing-axe hit attempts to strip one magic effect off the target, at a caster-level check equal to your **character level** (very high). Comes online just as Chapter 4 demons start arriving buffed to the teeth; with your volume of attacks it shreds enemy buffs fast.
      - tag: HIT
        name: "[[Bleeding Attack]]"
        note: sneak attacks also bleed the target each round; small but free, and it drops Constitution-vulnerable enemies faster.
      - tag: CHAIN
        name: "[[Dazzling Display]] → [[Shatter Defenses]]"
        note: frightened/shaken enemies are treated as flat-footed against you, opening them to sneak attack. Syncs with party casters getting [[Frightful Aspect]] around Chapter 4.
      - name: Buffs to bring (from party casters)
        note: size spells — [[Enlarge Person]] and especially [[Legendary Proportions]] — raise her Strength (and therefore throwing-axe damage). Add Haste and any team attack/save buffs. [[Frightful Aspect]] on her (or nearby) helps drive the [[Shatter Defenses]] loop.
