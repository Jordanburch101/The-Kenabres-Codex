  note: |-
    **Take classes in exactly this order.** Starts with [[Dodge]] & [[Shield Focus]] already. Ability increases (levels 4/8/12/16/20) go into **CHA** (or STR).

    **Alt order:** you get [[Dragon Disciple]] (4) and [[Mutation Warrior]] (3) either way — the video takes [[Dragon Disciple]] first for earlier stat bonuses. If you take [[Fighter]] first instead, you get feats like [[Dazzling Display]] / [[Shatter Defenses]] earlier via fighter bonus slots. Late feats ([[Toughness]], [[Blind Fight]], the mutation-warrior picks) are flexible.
picks:
  - heading: Witch Spells & Scrolls
    items:
      - name: "[[Mage Armor]] → later Archmage Armor (mythic)"
        note: "the tanking centerpiece; also buffs unarmored pets/allies. *Cast it out of combat with armor off (arcane spell failure), then re-equip.*"
      - name: "[[Cure Light Wounds]]"
        note: on-demand out-of-battle healing to spare potions early.
      - name: "[[False Life]] (added via [[Dragon Disciple]])"
        note: temporary HP.
      - tag: SCROLL
        name: "[[Frightful Aspect]]"
        note: "via high [[Use Magic Device]]. A polymorph that procs the Lizard Tail belt + [[Master Shapeshifter]] bonus and adds stacking natural AC. A tank's dream."
gear:
  - k: Weapon
    v: "Thematic: **Radiance**, the unique [[Paladin]] Holy Avenger longsword (decent, not top-tier). Also **Carsomyr**-style Holy Avenger. **Holy Devotee's** longsword (ch.4) smites neutral enemies too (useful for the *Inevitable Excess* DLC). **Scimitar** is best purely mechanically (crit range)."
    flag: "Video references the 'classic Baldur's Gate Holy Avenger' — likely Carsomyr-flavored. Verify the exact in-game longsword."
  - k: "Special: Hammer of Masterpiece"
    v: "From **Seelah's last personal quest**. Not for attacking — cast its buff: **+3 circumstance atk/dmg to an ally for 1 hour** (buff persists without keeping it equipped). Cast on a **pet** and it grants **+2 attacks/round** — unique in the game."
    flag: "Verify exact item name 'Hammer of Masterpiece' and quest source."
  - k: Armor
    v: "**Living Fortress** (best heavy armor — % damage reduction + innate heavy fortification) or **Flowing Half-Plate** (ch.4 market; +5 reflex saves + **Evasion** — huge with your high saves). Ch.1–3: any **full plate** (avoid mithral — counts as medium)."
  - k: Shield
    v: "**Assertion of Dominance** — zero damage from slashing/piercing while at full HP (easy for this tank). **Avoid Tower Shields**: they cap max DEX-to-AC, and Mythic Avoidance counts as DEX, so a tower shield *tanks* your AC. Early: **Guardian's Shield** (ch.3, knockdown immunity + extra AoO); **Undying Love of the Hopebringer** (ch.4)."
  - k: Amulet
    v: "**Heartstone of the Night Hag Queen** (+7 natural AC; ch.5) or **Voracious Spirit** (Camellia's last quest; stacking AC on kills). Earlier: initiative amulets (smite ASAP)."
    flag: "Verify 'Heartstone of the Night Hag Queen' and 'Voracious Spirit' amulet names/sources."
  - k: Belt
    v: "**Lizard Tail Belt** (ch.4+) — the best tank belt: +3 morale AC and +8 circumstance AC on the first combat round (enough, since fights end in 1–2 rounds). Being polymorphed is fine. Earlier: STR belts."
  - k: Head
    v: "Helmet: **Shynryu** (profane AC + STR → more AC via Avoidance). Ch.3 until then: **Helmet of Comraderie** (morale AC). Glasses/Mask: **Broken Trickster Glasses** (ch.3+; big CHA + tank property; frees the helmet slot)."
    flag: "Helmet name transcribed as 'Shyy' — verify exact name; profane bonus to AC and STR."
  - k: Cloak
    v: "Early: **Cloak of Resistance** (highest modifier). Ultimately **Grand Festival Cloak** (+CHA circumstance for bigger smites)."
    flag: "Verify 'Grand Festival Cloak' name/source."
  - k: Rings
    v: "**Icy Protector** — must-have, **ch.1 in the tavern**; it's what makes the witch dip's AC so strong. **Righteous Crusader** (more smite uses). **Ring of Triumphant Advance** & **Seven Virtues of a True Ruler** are great but usually go on the main character."
  - k: Boots
    v: "**Ranph's Sacrifice** — doubles the haste AC bonus; best boots for a tank."
    flag: "Boots name transcribed as 'ronx sacrifice' — verify. Doubles the haste bonus to AC; higher DEX also helps initiative."
  - k: Gloves
    v: "**Embroidered Gloves** (ch.5; luck bonus to AC + all saves). Anything before that."
  - k: Bracers
    v: "**Bracers of Rough Landing** — competence AC vs flying enemies (many demons have wings)."
  - k: Quick Slots
    v: "**Aroden's** item (Smite AC → Sacred + 1d4 divine on first hit). [[Paladin]] spell-slot item for [[Divine Favor]] / [[Bestow Grace]]. **Covenant of the Inheritor** (party-wide: bypass demon physical DR). **Duality of Conjuration & Summoning** (+1 permanent smite scroll). Extend rods. Scrolls of **[[Frightful Aspect]]**."
    flag: "Quick-slot item transcribed as 'aroden' — verify. Changes Smite's AC bonus from deflection to Sacred (unique source) and adds 1d4 divine to your first attack each round. Paladin spell-slot item name transcribed as 'Old Gmar' in audio — verify the item that grants paladin spell slots."
mythic:
  table:
    headers:
      - Rank
      - Pick
      - Why
    rows:
      - lv: 1
        cells:
          - "[[Last Stand]]"
          - With this + high AC, Seelah essentially never dies.
      - lv: 2
        cells:
          - "Mythic Heavy [[Armor Focus]] → [[Avoidance]]"
          - "Adds **½ your STR bonus to AC** (instead of DEX), uncapped. With [[Dragon Disciple]] + buffs STR can hit +20 → **+10 AC**."
      - lv: 3
        cells:
          - "[[Ever Ready]]"
          - So Seelah also attacks well (attacks of opportunity), not just tanks.
      - lv: 4
        cells:
          - "Mythic [[Dodge]] (or Mythic Critical)"
          - "[[Dodge]] = more tanking (preferred). Mythic Critical if you want more damage. Skip other [[Armor Focus]] lines — AC > DR on Unfair."
      - lv: 5
        cells:
          - "[[Abundant Smite]] (or [[Master Shapeshifter]])"
          - "[[Abundant Smite]] = full-power smites (you have [[Mark of Justice]]). [[Master Shapeshifter]] enables *[[Frightful Aspect]]* from scrolls."
      - lv: 6
        cells:
          - Mythic Critical (weapon)
          - On your chosen weapon.
      - lv: 7
        cells:
          - Archmage Armor
          - "**[[Mage Armor]]** now gives ~+11 AC (scales with mythic rank) and **stacks with full plate** — best-of-both-worlds normal AC."
      - lv: 8
        cells:
          - Mythic Initiative
          - Smite the Demon Lords the instant combat starts.
      - lv: 9
        cells:
          - "[[Abundant Smite]] / [[Master Shapeshifter]] / Mythic Beast"
          - Whichever of the level-5 pair you skipped (or Mythic Beast).
combat:
  bullets:
    - "**Pre-buff.** [[Barkskin]], [[Shield of Faith]], and your usual defensive stack."
    - "**Formation.** Put Seelah **ahead** of the party so enemies target her first; keep casters at the back (Seelah reaches enemies first)."
    - "**Fight Defensively** — always on for the AC bonus (plus [[Crane Style]] if you took [[Monk]])."
    - "**On Unfair: pre-cast [[Protective Luck]]** on Seelah before battle (from Camellia or Ember — infinite uses). Enemies roll twice and take the worse, so no auto-hit nat-20s in that critical first round. Keep re-casting during the fight; duration grows with Shaman/[[Witch]] levels."
    - "**Reach backup.** A party member with a reach two-hander can attack enemies stuck behind your wall."
    - "**Armor-off trick.** Before battle, remove armor + shield to cast [[Witch]] **[[Mage Armor]]** on pets/allies/herself (arcane spell failure otherwise), then re-equip. After Archmage Armor you can also heal allies this way — *out of combat only*."
