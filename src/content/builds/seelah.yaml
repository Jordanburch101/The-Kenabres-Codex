summary: "The classic tank done to its extreme: full plate, longsword, and shield, stacked to **over 100 AC** (≈130+ mid-combat) with enormous saving throws to shrug off enemy spells. A one-level **[[Witch]]** dip and **[[Dragon Disciple]]** feed natural-armor and Strength that the new **Mythic Heavy [[Armor Focus]]** converts straight into AC. Still hits hard enough for Smite/[[Outflank]] support and carries the party-wide [[Mark of Justice]] — the ultimate wall at every point of an Unfair run."
abilityScores:
  cha:
    value: PRIMARY
    tag: level-ups here
    emphasis: hi
  str:
    value: strong alt
    tag: atk/dmg/AC
    emphasis: hi
  note: "**Charisma** is the primary level-up stat — best synergy with the top [[Paladin]] abilities: [[Smite Evil]] and especially **[[Mark of Justice]]** (party-wide). Put your +1-every-4-levels increases here. **Strength** is a strong alternative — feeds attack, damage, *and* AC later (Mythic Avoidance adds ½ your STR bonus to AC). [[Dragon Disciple]] + mutagen push STR high. Keep enough CON/DEX for a tank; don't lower Intelligence to the point you lose the skill ranks you need (UMD, [[Mobility]], [[Athletics]], Knowledge Arcana). Seelah is a story companion (respec her at the start), so the video gives priorities and level-up increases rather than a fixed point-buy."
skills:
  main: "**[[Use Magic Device]]** — the priority. Lets Seelah cast from scrolls: buff, heal, revive allies, and proc *[[Frightful Aspect]]* (see Combat/Gear). **[[Mobility]]** — just **3 ranks** for the higher AC bonus while Fighting Defensively; after that, stop. **Knowledge (Arcana)** — **5 ranks** to qualify for [[Dragon Disciple]] (can be delayed until just before you take it)."
  note: "**[[Athletics]]** — dump the rest here (high STR; avoids some [[Athletics]]-check failures)."
identity:
  - k: Concept
    v: "A **[[Paladin]]** base spliced with precise one- and few-level dips, each earning its keep in AC. The class **order** matters — follow the level table exactly."
  - k: Classes
    v: "**[[Paladin]] 11** (core) · **Stigmatized [[Witch]] 1** (natural-AC dip + arcane casting) · **Traditional [[Monk]] 1** (saves + [[Crane Style]]) · **[[Dragon Disciple]] 4** (STR + natural AC) · **[[Fighter]] / [[Mutation Warrior]] 3** (bonus feats + mutagen)."
  - k: Why the dips
    v: "**[[Witch]]**: nothing gives more early AC per level (lizard familiar + hex + ring). Stigmatized is CHA-based ([[Paladin]]'s stat) and spontaneous arcane — which qualifies you for **[[Dragon Disciple]]**. **[[Monk]]**: best-in-class saves from one level + unlocks [[Crane Style]]. **[[Dragon Disciple]]**: stacking natural AC and Strength. **[[Mutation Warrior]]**: bonus feats + a Strength mutagen."
  - k: Alignment
    v: "**Lawful Good** (Seelah's fixed alignment) — happens to satisfy [[Monk]] (lawful) and good-aligned [[Witch]] cleanly."
  - k: Mythic Path
    v: "Path is flexible — the tank power comes from **mythic abilities** ([[Last Stand]], [[Avoidance]], Archmage Armor), not a specific path. Pick the path you like."
